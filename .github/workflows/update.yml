name: Auto IPTV Playlist

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Installa strumenti
        run: sudo apt-get install jq -y

      - name: Genera playlist
        run: |
          echo "#EXTM3U" > playlist.m3u

          API="https://api.github.com/repos/sahind01/mutcats/contents/selcuk"

          FILES=$(curl -s $API | jq -r '.[] | select(.name | endswith(".m3u8")) | .name')

          for file in $FILES
          do
            NAME=$(echo $file | sed 's/.m3u8//g' | sed 's/-/ /g')
            echo "#EXTINF:-1,$NAME" >> playlist.m3u
            echo "https://raw.githubusercontent.com/sahind01/mutcats/main/selcuk/$file" >> playlist.m3u
          done

      - name: Commit e push
        run: |
          git config user.name "iptv-bot"
          git config user.email "bot@github.com"
          git add playlist.m3u
          git commit -m "update playlist" || echo "no changes"
          git push
  
  
  
  
